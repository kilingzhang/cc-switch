name: Sync upstream main

# 每天定时检查 upstream/main（farion1231/cc-switch）是否有新提交，
# 自动合并到 feature/07：
# - 无冲突：自动 merge + push
# - 有冲突：推送 conflict 分支 + 开 Issue 通知（附冲突文件和解决命令）
#
# 触发方式：
# 1. schedule: 每天 UTC 18:00（北京时间 02:00）
# 2. workflow_dispatch: 手动在 Actions 页面触发
#
# 权限说明：
# - push 分支：默认 GITHUB_TOKEN 即可
# - 开 Issue 通知：默认 GITHUB_TOKEN 即可（fork 仓库的 GITHUB_TOKEN 不能创建 PR，
#   所以用 Issue 通知代替；如配了 SYNC_TOKEN/PAT 则优先用它）

on:
  schedule:
    - cron: "0 18 * * *" # UTC 18:00 = 北京时间 02:00
  workflow_dispatch:
    inputs:
      target_branch:
        description: "目标分支（默认 feature/07）"
        required: false
        default: "feature/07"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve target branch
        id: vars
        run: |
          TARGET="${{ github.event.inputs.target_branch || 'feature/07' }}"
          echo "target_branch=$TARGET" >> $GITHUB_OUTPUT
          echo "Will sync upstream/main → $TARGET"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.target_branch }}
          fetch-depth: 0 # 完整历史，merge 需要
          token: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Add upstream remote & fetch
        run: |
          git remote add upstream https://github.com/farion1231/cc-switch.git
          git fetch upstream main
          echo "## Upstream commits not in ${{ steps.vars.outputs.target_branch }}:" >> $GITHUB_STEP_SUMMARY
          git log --oneline ${{ steps.vars.outputs.target_branch }}..upstream/main >> $GITHUB_STEP_SUMMARY || true

      - name: Check if sync needed
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Behind upstream/main by $BEHIND commits"
          if [ "$BEHIND" -eq 0 ]; then
            echo "✅ Already up to date, nothing to sync." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Attempt merge
        id: merge
        if: steps.check.outputs.behind != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git merge upstream/main --no-edit; then
            echo "merge_ok=true" >> $GITHUB_OUTPUT
            echo "✅ Merge succeeded without conflicts." >> $GITHUB_STEP_SUMMARY
          else
            echo "merge_ok=false" >> $GITHUB_OUTPUT
            echo "⚠️ Merge has conflicts, will open a PR." >> $GITHUB_STEP_SUMMARY
            # abort 以便后续创建 conflict 分支时状态干净
            git merge --abort || true
          fi

      - name: Push (no conflict)
        if: steps.merge.outputs.merge_ok == 'true'
        run: |
          git push origin ${{ steps.vars.outputs.target_branch }}
          echo "🚀 Pushed merged ${{ steps.vars.outputs.target_branch }}." >> $GITHUB_STEP_SUMMARY

      - name: Handle conflict (push branch + open issue)
        if: steps.merge.outputs.merge_ok == 'false'
        run: |
          TARGET="${{ steps.vars.outputs.target_branch }}"
          DATE=$(date -u +"%Y-%m-%d")
          PR_BRANCH="sync/upstream-main/$DATE"
          # 基于目标分支创建同步分支，在上面做 merge
          git checkout -b "$PR_BRANCH"
          git merge upstream/main --no-edit || true
          # 冲突时强制 commit（保留冲突标记），让分支有实际内容便于人工 diff
          git add -A || true
          git commit -m "merge upstream/main (conflicts unresolved, needs manual resolution)" --no-verify || true
          git push --force-with-lease origin "$PR_BRANCH"
          # 收集冲突文件列表
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U HEAD~1 HEAD 2>/dev/null || echo "(见 diff)")
          # 收集上游新增提交
          UPSTREAM_LOG=$(git log --oneline HEAD..upstream/main 2>/dev/null | head -20 || echo "")
          # 开 Issue 通知（GITHUB_TOKEN 即可，无需 PAT）
          gh issue create \
            --title "⚠️ upstream/main 同步冲突 ($DATE) — 需手动解决" \
            --body "$(cat <<BODY
          自动同步检测到 \`upstream/main\` 有新提交，但合并到 \`$TARGET\` 时产生冲突。

          ## 冲突分支
          \`$PR_BRANCH\`（已推送到远端，包含未解决冲突的 merge commit）

          ## 冲突文件
          \`\`\`
          $CONFLICT_FILES
          \`\`\`

          ## 解决步骤
          \`\`\`bash
          git fetch origin
          git checkout $TARGET
          git merge upstream/main
          # 解决上述文件的冲突...
          git add .
          git commit
          git push origin $TARGET
          \`\`\`

          ## 上游新增提交
          \`\`\`
          $UPSTREAM_LOG
          \`\`\`

          解决后可关闭此 Issue，并删除临时分支：
          \`git push origin --delete $PR_BRANCH\`
          BODY
          )" \
            --label "sync,conflict" 2>/dev/null || \
          gh issue create \
            --title "⚠️ upstream/main 同步冲突 ($DATE) — 需手动解决" \
            --body "见 workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "📋 Opened conflict issue for $TARGET." >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}
